services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      FRONTEND_ORIGINS: http://localhost:5173

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend-node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend-node_modules:
